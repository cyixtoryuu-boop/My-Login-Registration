<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<!-- Bootstrap 5 CDN Link -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<style>
/* Identical Background Design Style */
body {
background: linear-gradient(135deg, #4d0477 30%, #585ae0 70%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}
/* Simple Semi-Transparent Card Container */
.register-card {
background-color: rgba(20, 41, 231, 0.459);
backdrop-filter: blur(10px);
border: 1px solid rgba(45, 155, 199, 0.473);
padding: 30px;
border-radius: 10px;
color: white;
width: 100%;
max-width: 600px;
}
</style>
</head>
<body>
<div class="register-card">
<h2 class="text-center mb-4">Student Registration</h2>

<form action="#" method="POST" onsubmit="event.preventDefault();">
<!-- Row 1: Full Name and LRN Fields -->
<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Name</label>
<input type="text" class="form-control" placeholder="Full Name" required>
</div>
<div class="col-md-6">
<label class="form-label">Student LRN</label>
<input type="text" class="form-control is-valid"

value="401234567890">

<div class="valid-feedback fw-bold text-info">
LRN verified successfully!
</div>
</div>
</div>
<!-- Row 2: Combined Username Field Component -->
<div class="mb-3">
<label class="form-label">Email Handle</label>
<div class="input-group">
<span class="input-group-text">@</span>
<input type="text" class="form-control"

placeholder="Student.Email" required>

<span class="input-group-text">@Deped.gov.ph</span>
</div>
</div>
<!-- Row 3: Track Selection and Gender Controls -->
<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Academic Track / Strand</label>
<select class="form-select" required>
<option value="" selected disabled>Choose strand...</option>
<option value="ict">ICT (Programming)</option>
<option value="ict">ICT (Graphics and Animation)</option>
<option value="stem">STEM</option>
<option value="abm">ABM</option>
<option value="humms">HUMMS</option>
<option value="gas">GAS</option>
</select>
</div>
<div class="col-md-6">
<label class="form-label d-block">Gender Profile</label>
<div class="form-check form-check-inline mt-2">
<input class="form-check-input" type="radio" name="gender"

id="male" checked>

<label class="form-check-label" for="male">Male</label>
</div>
<div class="form-check form-check-inline mt-2">
<input class="form-check-input" type="radio" name="gender"

id="female">

<label class="form-check-label" for="female">Female</label>
</div>
</div>

</div>
<!-- NEW Row 4: Password and Confirm Password Fields -->
<div class="row mb-3">
<div class="col-md-6">
<label class="form-label">Create Password</label>
<input type="password" class="form-control" placeholder="Create strong 

password" required>
</div>
<div class="col-md-6">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" placeholder="Retype your 

password" required>
</div>
</div>
<!-- Row 5: Checkbox terms option wrapper -->
<div class="mb-4 form-check">
<input class="form-check-input" type="checkbox" id="terms" checked

required>

<label class="form-check-label small text-white-50" for="terms">
I agree to the digital Data Privacy Policy rules.
</label>
</div>
<button type="submit" class="btn btn-success w-100 py-2">Submit
Registration</button>
<button type="submit" class="btn btn-success w-100 btn-lg mt-2"><a href="Activity8.html" class="text-white text-decoration-none">Sign up</a></button>
</form>
</div> 

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        
</body>
</html>
