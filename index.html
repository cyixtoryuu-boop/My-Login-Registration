<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login HTML</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<!-- Bootstrap 5 CDN Link -->
<style>
/* Simple Background Gradient and Centered Layout */
body {
background: linear-gradient(135deg, #4d0477 30%, #585ae0 70%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}
/* Simple Semi-Transparent Card Container */
.login-card {
background-color: rgba(20, 41, 231, 0.459);
backdrop-filter: blur(10px);
border: 1px solid rgba(45, 155, 199, 0.473);
padding: 30px;
border-radius: 10px;
color: rgb(255, 255, 255);
width: 100%;
max-width: 400px;
}


</style>
</head>
<body>
<div class="login-card">
<h2 class="text-center mb-4">LOGIN YOUR ACCOUNT</h2>


<form action="#" method="POST">

<div class="form-floating mb-3">
<input type="email" class="form-control form-control-lg text-dark"

id="emailInput" placeholder="name@example.com" required>

<label for="emailInput" class="text-dark">Email Address</label>
</div>



<div class="form-floating mb-3">
<input type="password" class="form-control form-control-lg is-invalid

text-dark" id="passwordInput" placeholder="Password">

<label for="passwordInput" class="text-dark">Password</label>
<!-- Error message text label -->
<div class="invalid-feedback text-red fw-bold">
Your password is incorrect! Please try again.
</div>
</div>

<button type="submit" class="btn btn-success w-100 btn-lg mt-2">Log in</button>

 <button type="submit" class="btn btn-success w-100 btn-lg mt-2"><a href="Activity8_page2.html " class="text-white text-decoration-none">Sign up</a></button>
</form>
</div>
</body>
</html>
